services:
  nginx:
    container_name: inception-nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: inception/nginx:v1

    networks:
      - inception
    ports:
      - 443:443
    volumes:
      - wp-volume:/var/www/html

    restart: always

    depends_on:
      - wordpress
    
  wordpress:
    container_name: inception-wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
      args:
        WORDPRESS_VERSION: ${WP_VERSION}
    image: inception/wordpress:v1

    networks:
      - inception
    ports:
      - 9000
    volumes:
      - wp-volume:/var/www/html

    environment:
      WORDPRESS_DB_HOST: ${MYSQL_HOST}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PW}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX}
      WORDPRESS_VERSION: ${WP_VERSION}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

    restart: always

    depends_on:
      - mariadb
      - redis

  mariadb:
    container_name: inception-mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: inception/mariadb:v1

    networks:
      - inception
    ports:
      - 3306
    volumes:
      - db-volume:/var/lib/mysql

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PW}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PW}
      ADMINER_USER: ${ADMINER_USER}
      ADMINER_PASSWORD: ${ADMINER_PASSWORD}

    restart: always

  ftp:
    container_name: inception-ftp
    build:
      context: ./requirements/bonus/ftp
      dockerfile: Dockerfile
    image: inception/ftp:v1

    ports:
      - 0.0.0.0:20:20
      - 0.0.0.0:21:21
      - 21100-21110:21100-21110

    volumes:
      - wp-volume:/var/www/html
    
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASS: ${FTP_PASS}
    
    depends_on:
      - wordpress

    restart: always
  
  adminer:
    container_name: inception-adminer
    build:
      context: ./requirements/bonus/adminer
      dockerfile: Dockerfile
    image: inception/adminer:v1

    networks:
      - inception
    ports:
      - 8080:8080

    environment:
      ADMINER_VERSION: ${ADMINER_VERSION}
    
    depends_on:
      - mariadb
    
    restart: always

  redis:
    container_name: inception-redis
    build:
      context: ./requirements/bonus/redis
      dockerfile: Dockerfile
    image: inception/redis:v1

    networks:
      - inception
    ports:
      - 6379
    
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    
    restart: always
  
  irc:
    container_name: inception-irc
    build:
      context: ./requirements/bonus/irc
      dockerfile: Dockerfile
    image: inception/irc:v1
    
    ports:
      - 6667:6667

    restart: always

  website:
    container_name: inception-website
    build:
      context: ./requirements/bonus/website
      dockerfile: Dockerfile
    image: inception/website:v1

    ports:
      - 8081:8081

    restart: always

volumes:
  db-volume:
    driver: local
    driver_opts:
      device: ${DB_VOLUME}
      type: none
      o: bind

  wp-volume:
    driver: local
    driver_opts:
      device: ${WP_VOLUME}
      type: none
      o: bind


networks:
  inception:
    name: inception
    driver: bridge
