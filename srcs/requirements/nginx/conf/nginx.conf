events {}

http {
    server {
        listen 80;
        server_name yeonjuki.42.fr;

        return 301 https://$server_name;
    }

    server {
        listen 443 ssl;
        server_name yeonjuki.42.fr;

        ssl_certificate /root/.tls/server.crt;
        ssl_certificate_key /root/.tls/server.key;
    }
}
